{% load static %}

<!DOCTYPE html>   
<html lang="en">
<head>
<title>Sentiment Analysis Model</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="{% static 'layout/styles/layout.css' %}" rel="stylesheet" type="text/css" media="all">

<style>
  /* Background Styling */
  body {
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: url("{% static 'images/demo/backgrounds/sentimentalAnalysisPage.jpg' %}") no-repeat center center/cover;
    position: relative;
  }

  /* Dark overlay for readability */
  .overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.1);
    z-index: 1;
    filter: brightness(20%); 
  }

  /* Content Wrapper */
  .container {
    position: relative;
    z-index: 2;
    background: rgba(0, 0, 0, 0.8);
    padding: 30px;
    border-radius: 10px;
    text-align: center;
    color: #00ffcc;
    box-shadow: 0 0 20px rgba(0, 255, 204, 0.5);
    max-width: 400px;
    width: 90%;
  }

  /* Headline */
  .container h1 {
    text-shadow: 0 0 15px #00ffcc, 0 0 30px #00ffcc;
  }

  /* Input Fields */
  .input100, select {
    padding: 12px;
    font-size: 18px;
    width: 100%;
    margin-top: 10px;
    background: rgba(0, 0, 0, 0.6);
    color: #00ffcc;
    border: 2px solid #00ffcc;
    border-radius: 5px;
    text-align: center;
    outline: none;
  }

  .input100:focus {
    box-shadow: 0 0 15px #00ffcc;
  }

  /* Neon Button */
  .btn {
    background: rgba(0, 0, 0, 0.6);
    color: #00ffcc;
    padding: 12px 25px;
    border: 2px solid #00ffcc;
    border-radius: 5px;
    font-size: 20px;
    cursor: pointer;
    transition: 0.3s;
    text-shadow: 0 0 15px #00ffcc;
    box-shadow: 0 0 15px #00ffcc;
    width: 100%;
    margin-top: 15px;
  }

  .btn:hover {
    background: #00ffcc;
    color: black;
    text-shadow: none;
    box-shadow: 0 0 25px #00ffcc, 0 0 50px #00ffcc;
  }

</style>
</head>

<body>
<div class="overlay"></div> 

<div class="container">
  <h1>Sentiment Analysis Model</h1>
  
  <!-- Form -->
  <form action="output" method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    
    <label for="text">Enter Text:</label>
    <input class="input100" type="text" name="text" required>
    
    <label for="algo">Select Algorithm:</label>
    <select name="algo" class="input100">
      <option value='SVM'>SVM Model</option>
      <option value='SVM_Pipeline'>SVM Pipeline Model</option>
      <option value='NaiveBayes'>Naive Bayes Model</option>
      <option value='MultinomialNB'>Multinomial NB Model</option>
    </select>
    
    <button type="submit" class="btn">Predict</button>
  </form>
</div>

<!-- JavaScript -->
<script src="{% static 'layout/scripts/jquery.min.js' %}"></script>
<script src="{% static 'layout/scripts/jquery.backtotop.js' %}"></script>
<script src="{% static 'layout/scripts/jquery.mobilemenu.js' %}"></script>
</body>
</html>
