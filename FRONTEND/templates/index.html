{% load static %}

<!DOCTYPE html>   
<html lang="en">
<head>
<title>Restaurant Review - Sentiment Analysis</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="{% static 'layout/styles/layout.css' %}" rel="stylesheet" type="text/css" media="all">

<style>
  /* Background Styling */
  body {
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: url("{% static 'images/demo/backgrounds/loginScreen.jpg' %}") no-repeat center center/cover;
    font-family: Arial, sans-serif;
  }

  /* Dark overlay for contrast */
  .overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.2);
  }

  /* Login Container */
  .container {
    position: relative;
    z-index: 2;
    background: rgba(255, 255, 255, 0.95);
    padding: 30px;
    border-radius: 12px;
    text-align: center;
    color: #333;
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    max-width: 420px;
    width: 90%;
  }

  /* Headline */
  .container h1 {
    font-size: 26px;
    margin-bottom: 12px;
  }

  .container p {
    font-size: 14px;
    color: #666;
    margin-bottom: 20px;
  }

  /* Form Styling */
  .form-group {
    text-align: left;
    margin-bottom: 15px;
  }

  .form-group label {
    font-weight: bold;
    font-size: 14px;
    display: block;
    margin-bottom: 5px;
  }

  .input100 {
    padding: 12px;
    font-size: 16px;
    width: 100%;
    border: 1px solid #ccc;
    border-radius: 6px;
    outline: none;
    box-sizing: border-box;
  }

  .input100:focus {
    border-color: #007BFF;
    box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
  }

  /* Button */
  .btn {
    background: #007BFF;
    color: white;
    padding: 12px 20px;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    width: 100%;
    margin-top: 10px;
    transition: 0.3s;
    font-weight: bold;
  }

  .btn:hover {
    background: #0056b3;
  }

</style>
</head>

<body>
<div class="overlay"></div> <!-- Background Overlay -->

<div class="container">
  <h1>Restaurant Review</h1>
  <p>Use sentiment analysis to classify reviews as positive or negative.</p>
  
  <!-- Login Form -->
  <form action="input" method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    
    <div class="form-group">
      <label for="name">Name</label>
      <input class="input100" type="text" name="name" required>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input class="input100" type="password" name="password" required>
    </div>
    
    <button type="submit" class="btn">LOGIN</button>
  </form>
</div>

<!-- JavaScript -->
<script src="{% static 'layout/scripts/jquery.min.js' %}"></script>
<script src="{% static 'layout/scripts/jquery.backtotop.js' %}"></script>
<script src="{% static 'layout/scripts/jquery.mobilemenu.js' %}"></script>
</body>
</html>
