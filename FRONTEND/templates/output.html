{% load static %}

<!DOCTYPE html>   
<html lang="en">
<head>
<title>SENTIMENTAL ANALYSIS OUTPUT</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="{% static 'layout/styles/layout.css' %}" rel="stylesheet" type="text/css" media="all">

<style>
  /* Full-screen background container */
  .bg-container {
    position: fixed;
    width: 100%;
    height: 100vh;
    top: 0;
    left: 0;
    z-index: -1;
  }

  
  .bgded {
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    filter: brightness(50%); 
  }

  .positive-bg {
    background-image: url("{% static 'images/demo/backgrounds/positive.jpg' %}");
  }
  
  .negative-bg {
    background-image: url("{% static 'images/demo/backgrounds/negative.jpg' %}");
  }

  /* Center content with neon effect */
  .hoc {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
    color: white;
  }

  .heading {
    font-size: 40px;
    font-weight: bold;
    text-transform: uppercase;
    text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
  }

  /* Neon glowing effect on the button */
  .btn {
    display: inline-block;
    padding: 15px 40px;
    font-size: 22px;
    color: white;
    text-transform: uppercase;
    text-decoration: none;
    font-weight: bold;
    border: 2px solid white;
    border-radius: 10px;
    margin-top: 20px;
    transition: 0.3s ease-in-out;
  }

  /* Neon glowing effect on the button */
  .btn {
    display: inline-block;
    padding: 15px 40px;
    font-size: 22px;
    color: white;
    text-transform: uppercase;
    text-decoration: none;
    font-weight: bold;
    border: 2px solid white;
    border-radius: 10px;
    margin-top: 20px;
    transition: 0.3s ease-in-out;
  }

  .btn-positive {
    background-color: rgba(0, 255, 100, 0.3);
    box-shadow: 0 0 15px rgba(0, 255, 100, 0.8);
    text-shadow: 0 0 10px rgba(0, 255, 100, 1);
  }

  .btn-negative {
    background-color: rgba(255, 0, 0, 0.3);
    box-shadow: 0 0 15px rgba(255, 0, 0, 0.8);
    text-shadow: 0 0 10px rgba(255, 0, 0, 1);
  }

  .btn:hover {
    transform: scale(1.1);
  }

  .btn:hover {
    transform: scale(1.1);
  }

</style>
</head>

<body id="top">

<!-- Background Container -->
<div class="bg-container">
  <div class="bgded {% if out == 'Positive' %}positive-bg{% else %}negative-bg{% endif %}"></div>
</div>

<!-- Centered Output -->
<div id="pageintro" class="hoc clear"> 
    <article>
      <h3 class="heading">Predicted Review</h3>
      <footer><a class="btn" href="#">{{ out }}</a></footer>
    </article>
</div>

<!-- Back to Top Button -->
<a id="backtotop" href="#top"><i class="fas fa-chevron-up"></i></a>

<!-- JAVASCRIPTS -->
<script src="{% static 'layout/scripts/jquery.min.js' %}"></script>
<script src="{% static 'layout/scripts/jquery.backtotop.js' %}"></script>
<script src="{% static 'layout/scripts/jquery.mobilemenu.js' %}"></script>

</body>
</html>
